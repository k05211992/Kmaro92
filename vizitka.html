<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Алексей Шанаев — вайб-кодинг</title>
  <style>
    *, *::before, *::after {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    :root {
      --bg: #0a0a0a;
      --surface: #111111;
      --surface2: #1a1a1a;
      --accent1: #ffaa80;
      --accent2: #ff7f5c;
      --accent3: #ffd4b8;
      --yellow: #ffd84d;
      --text: #f1f5f9;
      --muted: #64748b;
      --border: rgba(255,255,255,0.06);
    }

    html, body {
      height: 100%;
    }

    body {
      background: var(--bg);
      color: var(--text);
      font-family: 'Segoe UI', system-ui, -apple-system, sans-serif;
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      overflow-x: hidden;
    }

    /* === Animated background grid === */
    body::before {
      content: '';
      position: fixed;
      inset: 0;
      background-image:
        linear-gradient(rgba(255,216,77,0.05) 1px, transparent 1px),
        linear-gradient(90deg, rgba(255,216,77,0.05) 1px, transparent 1px);
      background-size: 40px 40px;
      pointer-events: none;
      z-index: 0;
    }

    /* === Radial glow blobs === */
    .blob {
      position: fixed;
      border-radius: 50%;
      filter: blur(80px);
      opacity: 0.18;
      pointer-events: none;
      z-index: 0;
      animation: blobFloat 8s ease-in-out infinite alternate;
    }
    .blob-1 {
      width: 400px; height: 400px;
      background: var(--accent1);
      top: -100px; left: -100px;
      animation-delay: 0s;
    }
    .blob-2 {
      width: 350px; height: 350px;
      background: var(--accent2);
      bottom: -80px; right: -80px;
      animation-delay: 3s;
    }
    .blob-3 {
      width: 250px; height: 250px;
      background: var(--yellow);
      bottom: 20%; left: 20%;
      animation-delay: 1.5s;
    }

    @keyframes blobFloat {
      from { transform: translate(0, 0) scale(1); }
      to   { transform: translate(30px, 20px) scale(1.08); }
    }

    /* === Card === */
    .card {
      position: relative;
      z-index: 1;
      background: rgba(17,17,17,0.75);
      backdrop-filter: blur(24px);
      -webkit-backdrop-filter: blur(24px);
      border: 1px solid var(--border);
      border-radius: 28px;
      padding: 52px 48px 44px;
      width: min(420px, calc(100vw - 32px));
      text-align: center;
      box-shadow:
        0 0 0 1px rgba(255,255,255,0.04),
        0 32px 80px rgba(0,0,0,0.6),
        inset 0 1px 0 rgba(255,255,255,0.08);
    }

    /* === Avatar placeholder === */
    .avatar {
      width: 88px;
      height: 88px;
      border-radius: 50%;
      margin: 0 auto 24px;
      background: linear-gradient(135deg, var(--accent1), var(--accent2), var(--accent3));
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 38px;
      font-weight: 700;
      color: #fff;
      letter-spacing: -1px;
      box-shadow: 0 0 0 4px rgba(255,170,128,0.2), 0 0 30px rgba(255,170,128,0.25);
      animation: avatarPulse 3s ease-in-out infinite;
      user-select: none;
    }

    @keyframes avatarPulse {
      0%, 100% { box-shadow: 0 0 0 4px rgba(255,170,128,0.2), 0 0 30px rgba(255,170,128,0.25); }
      50%       { box-shadow: 0 0 0 8px rgba(255,170,128,0.1), 0 0 55px rgba(255,170,128,0.4); }
    }

    /* === Name === */
    .name {
      font-size: clamp(24px, 6vw, 32px);
      font-weight: 800;
      letter-spacing: -0.5px;
      line-height: 1.1;
      background: linear-gradient(135deg, #ffd84d 0%, var(--accent1) 45%, var(--accent2) 80%, #ffd4b8 100%);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
      filter: drop-shadow(0 0 20px rgba(167,139,250,0.5));
      animation: nameGlow 4s ease-in-out infinite alternate;
    }

    @keyframes nameGlow {
      from { filter: drop-shadow(0 0 14px rgba(255,216,77,0.55)); }
      to   { filter: drop-shadow(0 0 30px rgba(255,127,92,0.65)); }
    }

    /* === Badge === */
    .badge {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      margin-top: 14px;
      padding: 5px 14px;
      border-radius: 99px;
      background: rgba(255,170,128,0.1);
      border: 1px solid rgba(255,170,128,0.25);
      font-size: 13px;
      font-weight: 600;
      color: var(--accent1);
      letter-spacing: 0.3px;
    }

    .badge-dot {
      width: 7px;
      height: 7px;
      border-radius: 50%;
      background: var(--accent1);
      animation: blink 1.8s ease-in-out infinite;
    }

    @keyframes blink {
      0%, 100% { opacity: 1; transform: scale(1); }
      50%       { opacity: 0.4; transform: scale(0.75); }
    }

    /* === Divider === */
    .divider {
      height: 1px;
      margin: 30px 0;
      background: linear-gradient(90deg, transparent, var(--border) 20%, rgba(255,170,128,0.15) 50%, var(--border) 80%, transparent);
    }

    /* === Social links === */
    .socials {
      display: flex;
      justify-content: center;
      gap: 16px;
      margin-bottom: 28px;
    }

    .social-link {
      display: flex;
      align-items: center;
      justify-content: center;
      width: 50px;
      height: 50px;
      border-radius: 14px;
      background: var(--surface2);
      border: 1px solid var(--border);
      color: var(--muted);
      text-decoration: none;
      transition: transform 0.22s cubic-bezier(.34,1.56,.64,1),
                  background 0.2s ease,
                  border-color 0.2s ease,
                  color 0.2s ease,
                  box-shadow 0.2s ease;
      cursor: pointer;
    }

    .social-link svg {
      width: 22px;
      height: 22px;
      fill: currentColor;
      transition: fill 0.2s ease;
    }

    .social-link:hover {
      transform: translateY(-5px) scale(1.08);
    }

    .social-link.telegram:hover {
      background: rgba(41,182,246,0.12);
      border-color: rgba(41,182,246,0.4);
      color: #29b6f6;
      box-shadow: 0 8px 24px rgba(41,182,246,0.2);
    }

    .social-link.github:hover {
      background: rgba(241,241,241,0.08);
      border-color: rgba(241,241,241,0.25);
      color: #f1f1f1;
      box-shadow: 0 8px 24px rgba(241,241,241,0.08);
    }

    .social-link.vk:hover {
      background: rgba(71,106,180,0.15);
      border-color: rgba(71,106,180,0.45);
      color: #7d9fd8;
      box-shadow: 0 8px 24px rgba(71,106,180,0.2);
    }

    /* === CTA Button === */
    .cta {
      position: relative;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      gap: 10px;
      width: 100%;
      padding: 15px 24px;
      border-radius: 14px;
      border: none;
      cursor: pointer;
      font-size: 16px;
      font-weight: 700;
      letter-spacing: 0.2px;
      color: #fff;
      text-decoration: none;
      overflow: hidden;
      background: linear-gradient(135deg, #e8612a, #ffaa80, #ffd84d);
      background-size: 200% 200%;
      background-position: 0% 50%;
      box-shadow: 0 4px 24px rgba(232,97,42,0.35);
      transition: transform 0.18s cubic-bezier(.34,1.56,.64,1),
                  box-shadow 0.2s ease,
                  background-position 0.4s ease;
    }

    .cta:hover {
      transform: translateY(-3px) scale(1.02);
      background-position: 100% 50%;
      box-shadow: 0 10px 36px rgba(232,97,42,0.5), 0 0 0 1px rgba(255,170,128,0.35);
    }

    .cta:active {
      transform: translateY(0) scale(0.98);
    }

    /* Shimmer sweep */
    .cta::after {
      content: '';
      position: absolute;
      top: 0; left: -100%;
      width: 60%;
      height: 100%;
      background: linear-gradient(90deg, transparent, rgba(255,255,255,0.18), transparent);
      animation: shimmer 2.8s ease-in-out infinite;
    }

    @keyframes shimmer {
      0%   { left: -100%; }
      60%, 100% { left: 160%; }
    }

    .cta svg {
      width: 18px;
      height: 18px;
      fill: currentColor;
      flex-shrink: 0;
    }

    /* === Footer note === */
    .footer {
      margin-top: 22px;
      font-size: 12px;
      color: var(--muted);
      letter-spacing: 0.2px;
    }

    /* === Tooltip === */
    [data-tip] {
      position: relative;
    }
    [data-tip]::before {
      content: attr(data-tip);
      position: absolute;
      bottom: calc(100% + 10px);
      left: 50%;
      transform: translateX(-50%) scale(0.85);
      background: #1e1e2e;
      color: var(--text);
      padding: 4px 10px;
      border-radius: 7px;
      font-size: 12px;
      white-space: nowrap;
      border: 1px solid var(--border);
      opacity: 0;
      pointer-events: none;
      transition: opacity 0.15s ease, transform 0.15s ease;
    }
    [data-tip]:hover::before {
      opacity: 1;
      transform: translateX(-50%) scale(1);
    }

    /* === Particles === */
    .particles {
      position: fixed;
      inset: 0;
      pointer-events: none;
      z-index: 0;
      overflow: hidden;
    }
    .particle {
      position: absolute;
      width: 2px;
      height: 2px;
      border-radius: 50%;
      background: var(--accent1);
      opacity: 0;
      animation: particleRise linear infinite;
    }

    @keyframes particleRise {
      0%   { transform: translateY(0) scale(1); opacity: 0; }
      10%  { opacity: 0.6; }
      90%  { opacity: 0.2; }
      100% { transform: translateY(-100vh) scale(0.3); opacity: 0; }
    }
  </style>
</head>
<body>

  <script>
    // === Particle generator ===
    (function () {
      const container = document.getElementById('particles');
      const COLORS = ['#ffaa80', '#ff7f5c', '#ffd84d', '#ffe680', '#ffd4b8'];
      const COUNT = 28;

      for (let i = 0; i < COUNT; i++) {
        const p = document.createElement('div');
        p.className = 'particle';

        const size = Math.random() * 3 + 1;
        const left = Math.random() * 100;
        const duration = Math.random() * 14 + 8;
        const delay = Math.random() * 12;
        const color = COLORS[Math.floor(Math.random() * COLORS.length)];

        p.style.cssText = `
          width: ${size}px;
          height: ${size}px;
          left: ${left}%;
          bottom: -10px;
          background: ${color};
          animation-duration: ${duration}s;
          animation-delay: ${delay}s;
          box-shadow: 0 0 ${size * 2}px ${color};
        `;

        container.appendChild(p);
      }
    })();
  </script>
